version: 1.3.1
cache: true
fileStrategy: "local"

interface:
  customWelcome: 'Welcome to NyayAI! Your AI-powered legal assistant.'
  fileSearch: true
  # Keep endpointsMenu true so standard model picker still works for Naya-AI/Ollama
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: false

registration:
  socialLogins: ['github', 'google', 'discord', 'openid']

endpoints:
  custom:

    # ── Wills Drafting ─────────────────────────────────────────────────────────
    - name: "Wills Drafting"
      apiKey: "sk-will-backend-key-12345"
      baseURL: "http://willgen-api:8000/api"
      headers:
        X-LibreChat-Session: '{{LIBRECHAT_BODY_CONVERSATIONID}}'
      models:
        default: ["Will Drafting Assistant"]
        fetch: false
      modelDisplayLabel: "Will Drafting Assistant"
      # ── NyayAI nav: section header label shown in the sidebar ──────────────
      group: "Drafting"
      titleConvo: true
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 2000
        temperature: 0.7
      description: "Generate legal wills and estate documents"
      greeting: |
        👋 Welcome to Wills Drafting!

        I can help you create wills and estate planning documents.

        **Quick Commands:**
        - Ask: **"Draft a will for me"**
        - Ask: **"Update this will clause"**
        - Ask: **"Summarize the beneficiaries and assets"**

        📄 Start with your drafting instructions or upload supporting details.


    # ── Drafting Assistant ─────────────────────────────────────────────────────
    - name: "Drafting Assistant"
      apiKey: "drafting-assistant-dev-key"
      baseURL: "http://host.docker.internal:8004/v1"
      headers:
        X-LibreChat-Session: '{{LIBRECHAT_BODY_CONVERSATIONID}}'
      models:
        default: ["Structured Drafting Assistant"]
        fetch: false
      modelDisplayLabel: "Structured Drafting Assistant"
      group: "Drafting"
      titleConvo: true
      titleModel: "Structured Drafting Assistant"
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 4096
        temperature: 0.2
      description: "Structured legal document drafting with template-guided validation and draft generation"
      greeting: |
        👋 Welcome to the Drafting Assistant!

        I can guide you through structured legal drafting workflows.

        **Workflow:**
        - Select a document type
        - Review template requirements
        - Validate uploaded drafting inputs
        - Generate and revise a draft

        📑 Affidavit drafting is enabled first, with more document types coming soon.


    # ── Contract Review ────────────────────────────────────────────────────────
    - name: "Contract Review"
      apiKey: "legal-contract-dev-key"
      baseURL: "http://host.docker.internal:8001/v1"
      models:
        default: ["Tabular Contract Review"]
        fetch: false
      modelDisplayLabel: "Tabular Contract Review"
      # ── NyayAI nav: section header label shown in the sidebar ──────────────
      group: "Tabular Review"
      titleConvo: true
      titleModel: "Tabular Contract Review"
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 4096
        temperature: 0.1
      description: "AI-powered contract analysis with risk detection and redlining"
      greeting: |
        👋 Welcome to the Legal Contract Analyzer!
        
        I can help you analyze contracts, identify risks, and generate redlines.
        
        **Quick Commands:**
        - Upload a file and say: **"Analyze this contract"** or **"Analyze the contract"**
        - Ask: **"What are the key risks?"** (after analysis)
        - Request: **"Generate redlines"** or **"Show redline suggestions"**
        - Search: **"Find termination clauses"** or **"Show liability provisions"**
        
        📎 Simply attach your PDF, DOCX, or TXT contract file and tell me what you'd like to do!


    # ── PageIndex Contract Analysis ────────────────────────────────────────────
    - name: "PageIndex Contract Analysis"
      apiKey: "legal-contract-dev-key"
      baseURL: "http://host.docker.internal:8001/v1"
      models:
        default: ["PageIndex Contract Analysis"]
        fetch: false
      modelDisplayLabel: "PageIndex Contract Analysis"
      group: "Tabular Review"
      titleConvo: true
      titleModel: "PageIndex Contract Analysis"
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 4096
        temperature: 0.1
      description: "Ask any question about your contract and get page-linked, evidence-backed findings with a PDF preview"
      greeting: |
        👋 Welcome to **PageIndex Contract Analysis**!
        
        Upload your contract, then ask any question — for example:
        - **"What are the termination risks?"**
        - **"Summarise the confidentiality obligations"**
        - **"Which clauses create unlimited liability?"**
        
        I'll return page-linked findings with a live PDF preview on the right.


    # ── Legal Research ─────────────────────────────────────────────────────────
    - name: "Legal Research"
      apiKey: "legal-research-dev-key"
      baseURL: "http://host.docker.internal:8104/v1"
      models:
        default: ["legal-research"]
        fetch: false
      modelDisplayLabel: "Legal Research"
      # ── NyayAI nav: section header label shown in the sidebar ──────────────
      group: "Legal Research"
      titleConvo: true
      titleModel: "legal-research"
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 16000
        temperature: 1.0
      description: "AI-powered legal research assistant for case law, statutes, and regulations"
      greeting: |
        👋 Welcome to the Legal Research Assistant!
        
        I can help you conduct legal research on case law, statutes, and regulations.
        
        **Quick Commands:**
        - Ask: **"Find relevant case law on [topic]"**
        - Ask: **"What are the key statutes related to [topic]?"**
        - Ask: **"Summarize the legal landscape on [topic]"**
        
        📚 Just tell me your research topic or question, and I'll get started!

    - name: "Legal Research v3"
      apiKey: "legal-research-dev-key"
      baseURL: "http://host.docker.internal:8103/v1"
      models:
        default: ["legal-research-v3"]
        fetch: false
      modelDisplayLabel: "Legal Research v3"
      group: "Legal Research"
      titleConvo: true
      titleModel: "legal-research-v3"
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 16000
        temperature: 1.0
      description: "Agentic legal research workflow with live progress updates and provisional strategy support"
      greeting: |
        👋 Welcome to **Legal Research v3**!

        I can help you with an agentic legal research workflow that:
        - understands the matter facts,
        - asks targeted clarifications when needed,
        - retrieves supporting authorities,
        - and streams progress updates live.

        **Try asking:**
        - **"Need anticipatory bail strategy for a Delhi FIR under 498A"**
        - **"Research maintainability of a writ against blacklisting"**
        - **"Show supporting authorities for arbitration fraud exception"**
        
        ⚖️ I'll generate structured strategy cards anchored to retrieved authorities.


    # ── Naya-AI (Ollama) ───────────────────────────────────────────────────────
    # No `group` field → does NOT appear in the NyayFeatureNav.
    # Continues to appear only in the standard model selector dropdown.
    - name: "Naya-AI"
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        default:
          - "gpt-oss:20b"
          - "llama3.2:3b"
        fetch: false
      titleConvo: true
      titleModel: "gpt-oss:20b"
      summarize: false
      summaryModel: "gpt-oss:20b"
      forcePrompt: false
      modelDisplayLabel: "Ollama"
      dropParams:
        - "user"
