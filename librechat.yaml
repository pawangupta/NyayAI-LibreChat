version: 1.3.1
cache: true

interface:
  customWelcome: 'Welcome to NyayAI! Your AI-powered legal assistant.'
  fileSearch: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: false

registration:
  socialLogins: ['github', 'google', 'discord', 'openid']

endpoints:
  custom:
  
    # Will Generator - OpenAI Compatible Custom Endpoint
    - name: "Drafting Assistant"
      apiKey: "sk-will-backend-key-12345"
      baseURL: "http://willgen-api:8000/api"
      headers:
        X-LibreChat-Session: '{{LIBRECHAT_BODY_CONVERSATIONID}}'
      models:
        default: ["Will Drafting Assistant"]
        fetch: false
      modelDisplayLabel: "Will Drafting Assistant"
      group: "ParaLx" 
      titleConvo: true
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 2000
        temperature: 0.7


    # Tabular Contract Review
    - name: "Contract Review"
      apiKey: "legal-contract-dev-key"
      baseURL: "http://host.docker.internal:8000/v1"
      models:
        default: ["Tabular Contract Review"]
        fetch: false
      modelDisplayLabel: "Tabular Contract Review"
      group: "ParaLx"
      titleConvo: true
      titleModel: "Tabular Contract Review"
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 4096
        temperature: 0.1
      #iconURL: "/images/legal-icon.svg"
      #iconURL: "/assets/NyayAI.svg"

      description: "AI-powered contract analysis with risk detection and redlining"
      greeting: |
        👋 Welcome to the Legal Contract Analyzer!
        
        I can help you analyze contracts, identify risks, and generate redlines.
        
        **Quick Commands:**
        - Upload a file and say: **"Analyze this contract"** or **"Analyze the contract"**
        - Ask: **"What are the key risks?"** (after analysis)
        - Request: **"Generate redlines"** or **"Show redline suggestions"**
        - Search: **"Find termination clauses"** or **"Show liability provisions"**
        
        📎 Simply attach your PDF, DOCX, or TXT contract file and tell me what you'd like to do!

    # Legal Research - OpenAI Compatible Custom Endpoint
    - name: "Legal Research"
      apiKey: "legal-research-dev-key"
      baseURL: "http://host.docker.internal:8002/v1"
      models:
        default: ["Legal Research Assistant"]
        fetch: false
      modelDisplayLabel: "Legal Research Assistant"
      group: "ParaLx"
      titleConvo: true
      titleModel: "Legal Research Assistant"
      summarize: false
      forcePrompt: false
      dropParams:
        - user
        - frequency_penalty
        - presence_penalty
        - top_p
        - stop
      addParams:
        max_tokens: 4096
        temperature: 0.1
      #iconURL: "/images/legal-icon.svg"
      #iconURL: "/assets/NyayAI.svg"

      description: "AI-powered legal research assistant for case law, statutes, and regulations"
      greeting: |
        👋 Welcome to the Legal Research Assistant!
        
        I can help you conduct legal research on case law, statutes, and regulations.
        
        **Quick Commands:**
        - Ask: **"Find relevant case law on [topic]"**
        - Ask: **"What are the key statutes related to [topic]?"**
        - Ask: **"Summarize the legal landscape on [topic]"**
        
        📚 Just tell me your research topic or question, and I'll get started !

  # Ollama
    - name: "Naya-AI"
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        default: 
          - "gpt-oss:20b"
          - "llama3.2:3b"
        fetch: false
      titleConvo: true
      titleModel: "gpt-oss:20b"
      summarize: false
      summaryModel: "gpt-oss:20b"
      forcePrompt: false
      modelDisplayLabel: "Ollama"
      group: "ParaLx" 
      dropParams:
        - "user"
